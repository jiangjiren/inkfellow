let wechatPollInterval = null;
let currentWechatSessionKey = null;

async function checkWechatStatus() {
  try {
    const res = await fetch("api/wechat/status");
    const data = await res.json();
    const statusText = document.getElementById("wechat-status-text");
    const actionBtn = document.getElementById("wechat-action-btn");
    const qrArea = document.getElementById("wechat-qr-area");

    if (data.connected) {
      statusText.innerHTML = `🟢 <strong>微信已连接</strong> (Bot ID: <code style="background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px;">${data.botId}</code>)<br/><span style="font-size: 11px; color: var(--fg-color-secondary);">你现在可在微信直接向此 AI 助手发送消息，共享当前笔记知识库。</span>`;
      actionBtn.innerText = "断开微信机器人连接";
      actionBtn.style.color = "#ef4444";
      actionBtn.style.borderColor = "#fecaca";
      qrArea.style.display = "none";
      stopWechatPolling();
    } else {
      statusText.innerHTML = `🔴 <strong>微信未连接</strong><br/><span style="font-size: 11px; color: var(--fg-color-secondary);">连接后，你可在微信对话使用此助手与笔记知识库。</span>`;
      actionBtn.innerText = "连接微信机器人";
      actionBtn.style.color = "var(--fg-color)";
      actionBtn.style.borderColor = "var(--border-color)";
    }
  } catch (err) {
    console.error("Failed to fetch WeChat status", err);
  }
}

function stopWechatPolling() {
  if (wechatPollInterval) {
    clearInterval(wechatPollInterval);
    wechatPollInterval = null;
  }
  currentWechatSessionKey = null;
  document.getElementById("wechat-qr-area").style.display = "none";
  document.getElementById("wechat-verify-area").style.display = "none";
}

async function startWechatLogin() {
  const qrArea = document.getElementById("wechat-qr-area");
  const qrImg = document.getElementById("wechat-qr-img");
  const statusText = document.getElementById("wechat-status-text");
  
  statusText.innerText = "⏳ 正在生成微信登录二维码...";
  
  try {
    const res = await fetch("api/wechat/login/start", { method: "POST" });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    currentWechatSessionKey = data.sessionKey;
    qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(data.qrcodeUrl);
    qrArea.style.display = "flex";
    statusText.innerHTML = "🟡 <strong>请扫码</strong><br/><span style='font-size:11px;'>微信扫码并确认以启动桥接器</span>";

    // Poll status every 2 seconds
    wechatPollInterval = setInterval(pollWechatStatus, 2000);
  } catch (err) {
    statusText.innerText = `❌ 生成二维码失败: ${err.message}`;
  }
}

async function pollWechatStatus(verifyCode = "") {
  if (!currentWechatSessionKey) return;
  
  let url = `api/wechat/login/poll?sessionKey=${currentWechatSessionKey}`;
  if (verifyCode) url += `&verifyCode=${encodeURIComponent(verifyCode)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    const statusText = document.getElementById("wechat-status-text");
    const verifyArea = document.getElementById("wechat-verify-area");

    switch (data.status) {
      case "scaned":
        statusText.innerHTML = "🟡 <strong>已扫码！</strong><br/><span style='font-size:11px;'>正在微信手机端同意登录以完成绑定...</span>";
        verifyArea.style.display = "none";
        break;
      case "need_verifycode":
        statusText.innerHTML = "🟡 <strong>安全确认</strong><br/><span style='font-size:11px;'>微信要求数字配对验证...</span>";
        verifyArea.style.display = "flex";
        break;
      case "confirmed":
        statusText.innerText = "🎉 微信机器人连接成功！";
        stopWechatPolling();
        setTimeout(checkWechatStatus, 1000);
        break;
      case "expired":
        statusText.innerText = "❌ 二维码已过期，请重新点击连接。";
        stopWechatPolling();
        break;
      case "verify_code_blocked":
        statusText.innerText = "❌ 数字验证错误次数过多，请稍后重新连接。";
        stopWechatPolling();
        break;
      case "wait":
      default:
        break;
    }
  } catch (err) {
    console.error("Error polling WeChat status", err);
  }
}

document.getElementById("wechat-action-btn").addEventListener("click", async (e) => {
  const btn = e.currentTarget;

// ── Markdown renderer ─────────────────────────────
function renderPlain(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
let _markedReady = false;
try {
  if (typeof marked !== "undefined") {
    marked.use({ gfm: true, breaks: true });
    _markedReady = true;
  }
} catch { }
function renderMarkdown(text) {
  if (!_markedReady) return `<pre style="white-space:pre-wrap">${renderPlain(text)}</pre>`;
  try {
    const result = marked.parse(text);
    return typeof result === "string" ? result : `<pre style="white-space:pre-wrap">${renderPlain(text)}</pre>`;
  } catch {
    return `<pre style="white-space:pre-wrap">${renderPlain(text)}</pre>`;
  }
}

function cloneJson(value) {
  if (value == null) return value;
  try {
    return JSON.parse(JSON.stringify(value));
  } catch {
    return value;
  }
}

function blockTypeLabel(type) {
  const labels = {
    sdk_event: "运行事件",
    redacted_thinking: "隐藏思考过程",
    server_tool_use: "服务端工具调用",
    web_search_tool_result: "网页搜索结果",

    code_execution_tool_result: "代码执行结果",
    bash_code_execution_tool_result: "Bash 执行结果",
    text_editor_code_execution_tool_result: "文件编辑结果",
    tool_search_tool_result: "工具搜索结果",
    mcp_tool_use: "MCP 工具调用",
    mcp_tool_result: "MCP 工具结果",
    tool_progress: "工具进度",
    tool_use_summary: "工具摘要",
    permission_denied: "权限拒绝",
    prompt_suggestion: "提示建议",
    notification: "通知",
    task_notification: "任务通知",
    status: "状态",
    refusal: "拒绝回复",
    codex_file_change: "文件变更",
    codex_todo_list: "任务清单",
    codex_web_search: "网页搜索",
    codex_error: "Codex 错误",
  };
  return labels[type] || type || "未知信息";
}

function jsonPreview(value) {
  if (typeof value === "string") return value;
  try {
    return JSON.stringify(value, null, 2);
  } catch {
    return String(value ?? "");
  }
}

function normalizeAssistantBlocks(content, fallbackText = "") {
  const blocks = [];
  for (const item of content || []) {
    const raw = cloneJson(item);
    if (item.type === "thinking" && item.thinking) {
      blocks.push({ type: "thinking", thinking: item.thinking, signature: item.signature ?? null, raw });
    } else if (item.type === "redacted_thinking") {
      blocks.push({ type: "redacted_thinking", data: item.data ?? null, raw });
    } else if (item.type === "text" && item.text) {
      blocks.push({ type: "text", text: item.text, citations: item.citations ?? null, raw });
    } else if (item.type === "refusal") {
      blocks.push({ type: "refusal", text: item.refusal ?? "", raw });
    } else if (item.type === "tool_use" || item.type === "server_tool_use" || item.type === "mcp_tool_use") {
      blocks.push({
        type: item.type,
        id: item.id ?? "",
        name: item.name ?? "tool",
        serverName: item.server_name ?? item.serverName ?? null,
        input: item.input ?? {},
        raw,
      });
    } else {
      blocks.push({
        type: item.type || "unknown",
        raw,
      });
    }
  }
  if (!blocks.some((block) => block.type === "text") && fallbackText) {
    blocks.push({ type: "text", text: fallbackText });
  }
  return blocks;
}

function textFromAssistantBlocks(blocks) {
  return (blocks || [])
    .filter((block) => (block.type === "text" || block.type === "refusal") && block.text)
    .map((block) => block.text)
    .join("\n\n");
}

function appendAssistantBlock(body, block) {
  if (block.type === "thinking" && block.thinking) {
    const el = document.createElement("details");
    el.className = "thinking-block";
    el.innerHTML = `<summary class="thinking-summary"><span class="thinking-dot"></span><span class="thinking-label">思考过程</span><span class="thinking-chevron">▶</span></summary><div class="thinking-content"></div>`;
    el.querySelector(".thinking-content").textContent = block.thinking;
    body.appendChild(el);
    return;
  }

  if (block.type === "redacted_thinking") {
    body.appendChild(makeHistoryBlock("隐藏思考过程", block.raw ?? block.data ?? block, "该思考内容由 Claude 加密或隐藏，原始数据已保存在历史记录中。"));
    return;
  }

  if (block.type === "text" && block.text) {
    const el = document.createElement("div");
    el.className = "msg-text";
    el.innerHTML = renderMarkdown(block.text);
    body.appendChild(el);
    return;
  }

  if (block.type === "refusal" && block.text) {
    body.appendChild(makeHistoryBlock("拒绝回复", block.raw ?? block, block.text));
    return;
  }

  if (block.type === "tool_use" || block.type === "server_tool_use" || block.type === "mcp_tool_use") {
    body.appendChild(makeToolEl(block));
    return;
  }

  if (block.type === "web_search_tool_result" || block.type === "web_fetch_tool_result") {
    body.appendChild(makeSearchResultBlock(block));
    return;
  }

  if (block.type === "tool_result" || block.type === "mcp_tool_result" || block.type?.includes("tool_result")) {
    body.appendChild(makeHistoryBlock(blockTypeLabel(block.type), block.raw ?? block));
    return;
  }

  if (block.type === "sdk_event") {
    const label = blockTypeLabel(block.eventType) || "运行事件";
    body.appendChild(makeHistoryBlock(label, block.raw ?? block));
    return;
  }

  body.appendChild(makeHistoryBlock(blockTypeLabel(block.type), block.raw ?? block));
}

function renderAssistantBlocks(body, blocks) {
  for (const block of blocks || []) appendAssistantBlock(body, block);
}

// ── Note context + mentionable vault files ────────────────
let currentNoteFile = null;
let noteContextEnabled = true;
let mentionEntries = [];
let mentionIndexState = "idle";
let mentionIndexPromise = null;
let mentionIndexLoadedAt = 0;
let mentionIndexError = null;
const MENTION_INDEX_TTL_MS = 60_000;
const MENTION_INDEX_TIMEOUT_MS = 10_000;
const selectedMentionFiles = new Map();

function renderNoteContext() {
  if (!currentNoteFile) {
    contextChip.classList.remove("visible");
    return;
  }
  const fileName = currentNoteFile.split("/").pop().replace(/\.(md|html?)$/i, "");
  ctxPathEl.textContent = fileName;
  contextChip.classList.add("visible");
  contextChip.classList.toggle("context-disabled", !noteContextEnabled);
  ctxToggle.setAttribute("aria-pressed", noteContextEnabled ? "true" : "false");
  ctxToggle.title = noteContextEnabled ? "不发送当前笔记上下文" : "发送当前笔记上下文";
}

function normalizeMentionSearch(value) {
  return String(value ?? "").normalize("NFKC").trim().toLocaleLowerCase();
}

function normalizeMentionEntries(entries) {
  const seen = new Set();
  const normalized = [];
  for (const candidate of Array.isArray(entries) ? entries : []) {
    if (!candidate || typeof candidate.path !== "string" || typeof candidate.title !== "string") continue;
    const path = candidate.path.trim();
    const title = candidate.title.trim();
    if (!path || !title || seen.has(path)) continue;
    seen.add(path);
    const aliases = Array.isArray(candidate.aliases)
      ? candidate.aliases
        .filter((alias) => typeof alias === "string" && alias.trim())
        .map((alias) => alias.trim())
      : [];
    normalized.push({
      path,
      title,
      aliases,
      kind: ["markdown", "html", "pdf", "image"].includes(candidate.kind) ? candidate.kind : "markdown",
      searchTitle: normalizeMentionSearch(title),
      searchPath: normalizeMentionSearch(path.replace(/\.[^/.]+$/i, "")),
      searchAliases: aliases.map(normalizeMentionSearch),
    });
  }
  return normalized;
}

function reconcileSelectedMentionFiles() {
  for (const path of selectedMentionFiles.keys()) {
    const refreshed = mentionEntries.find((entry) => entry.path === path);
    if (refreshed) selectedMentionFiles.set(path, refreshed);
    else selectedMentionFiles.delete(path);
  }
  renderMentionChips();
}

function loadMentionIndex({ force = false } = {}) {
  const isFresh = mentionIndexState === "ready"
    && Date.now() - mentionIndexLoadedAt < MENTION_INDEX_TTL_MS;
  if (!force && isFresh) return Promise.resolve();
  if (mentionIndexPromise) return mentionIndexPromise;

  const hasUsableEntries = mentionIndexState === "ready";
  if (!hasUsableEntries) mentionIndexState = "loading";
  const controller = new AbortController();
  const timeoutId = window.setTimeout(() => controller.abort(), MENTION_INDEX_TIMEOUT_MS);
  const requestUrl = `/api/notes/mentions?ts=${Date.now()}`;
  mentionIndexPromise = fetch(requestUrl, {
    cache: "no-store",
    credentials: "same-origin",
    signal: controller.signal,
  })
    .then(async (response) => {
      const payload = await response.json().catch(() => null);
      if (!response.ok) throw new Error(payload?.error || `文件索引加载失败：${response.status}`);
      mentionEntries = normalizeMentionEntries(payload?.entries);
      mentionIndexState = "ready";
      mentionIndexLoadedAt = Date.now();
      mentionIndexError = null;
      reconcileSelectedMentionFiles();
    })
    .catch((error) => {
      const normalizedError = error?.name === "AbortError"
        ? new Error("文件索引加载超时，请重试")
        : error;
      if (!hasUsableEntries) {
        mentionIndexState = "error";
        mentionIndexError = normalizedError?.message || "文件索引加载失败";
      }
      throw normalizedError;
    })
    .finally(() => {
      window.clearTimeout(timeoutId);
      mentionIndexPromise = null;
    });
  return mentionIndexPromise;
}

function renderMentionChips() {
  const files = [...selectedMentionFiles.values()];
  mentionChipsEl.classList.toggle("visible", files.length > 0);
  mentionChipsEl.innerHTML = files.map((file) => `
    <span class="mention-context-chip" title="${escapeAttr(file.path)}">
      <svg class="mention-context-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="mention-context-title">${escapeHtml(file.title)}</span>
      <button type="button" class="mention-context-remove" data-path="${escapeAttr(file.path)}" aria-label="移除文件 ${escapeAttr(file.title)}">×</button>
    </span>
  `).join("");
}

function clearMentionFiles() {
  selectedMentionFiles.clear();
  renderMentionChips();
}

mentionChipsEl.addEventListener("click", (e) => {
  const removeBtn = e.target.closest(".mention-context-remove");

const urlParams = new URLSearchParams(location.search);
const wsPort = urlParams.get('wsPort');
const wsUrl = wsPort 
  ? `${location.protocol === "https:" ? "wss:" : "ws:"}//${location.hostname}:${wsPort}/`
  : `${location.protocol === "https:" ? "wss:" : "ws:"}//${location.host}${location.pathname}`;
let ws = null;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    setGenerating(false, false);
    requestSkillRefresh(true);
  };
  ws.onclose = () => {
    sendBtn.disabled = true;
    clearAskUserQuestion();
    setGenerating(false, false);
    setTimeout(connect, 3000);
  };
  ws.onerror = () => { };
  ws.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch { } };
}
connect();

// Client-side failsafe: if the server stall watchdog (3 min) fires, it sends error+done.
// This timer is a last-resort belt-and-suspenders for cases where the WebSocket itself
// dies silently (no onclose event) — detected when we've been generating with no server
// events for longer than the server-side threshold plus a generous buffer.
const CLIENT_STALL_MS = 240_000; // 4 min — server kills at 3, so this only fires if WS is dead
function checkClientStall() {
  if (isGenerating && !isAwaitingAskUserQuestion && lastWsEventAt > 0 && Date.now() - lastWsEventAt > CLIENT_STALL_MS) {
    showInlineError("连接已断开，请重新发送消息。");
    setGenerating(false);
    removeTyping();
    lastWsEventAt = 0;
  }
}
setInterval(checkClientStall, 15_000);
// Mobile: JS timers pause when tab is backgrounded, so the interval above never fires.
// visibilitychange fires immediately when the user returns, giving instant recovery.
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) checkClientStall();
});

  { name: "compact",     desc: "压缩对话上下文以节省 token", kind: "builtin" },
  { name: "context",     desc: "查看当前上下文窗口用量",    kind: "builtin" },
  { name: "memory",      desc: "管理 Claude 记忆",          kind: "builtin" },
  { name: "model",       desc: "切换当前会话的模型",        kind: "builtin" },
  { name: "usage",       desc: "查看 API 用量和费用",       kind: "builtin" },
  { name: "status",      desc: "查看会话状态",              kind: "builtin" },
  { name: "help",        desc: "显示帮助信息",              kind: "builtin" },
  { name: "doctor",      desc: "诊断配置问题",              kind: "builtin" },
  { name: "permissions", desc: "管理工具权限",              kind: "builtin" },
];

let slashCommands = [...BUILTIN];
let currentSkillProvider = null;

function buildCommandList(skills) {
  slashCommands = [
    ...BUILTIN,
    ...skills.map((s) => ({ name: s, desc: "", kind: "skill" })),
  ];
}

function activeSkillProvider() {
  return getActiveProfile()?.provider === "codex" ? "codex" : "claude";
}

function requestSkillRefresh(force = false) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const provider = activeSkillProvider();
  if (!force && provider === currentSkillProvider) return;
  currentSkillProvider = provider;
  ws.send(JSON.stringify({
    type: "skills",
    provider,
    profileId: _profileData.activeProfileId,
  }));
}

// ── State ─────────────────────────────────────────────────
let assistantEl   = null;
let assistantTxt  = "";   // full text across all turns (for saving)
let assistantBlocks = [];  // rich blocks for history restore
let assistantRawMessages = []; // original assistant messages for maximum-fidelity history
let assistantEvents = []; // non-content SDK events that still explain the AI turn
  let blockMap      = {};   // block index → { el, type, accumulated }
  let prevTurnTexts = [];   // text from earlier turns within same response

  function isToolUseType(type) {
    return type === "tool_use" || type === "server_tool_use" || type === "mcp_tool_use";
  }

  function isToolResultType(type) {
    return type === "tool_result" || type === "mcp_tool_result" || type?.includes("tool_result");
  }

  function isToolResultEvent(ev) {
    const content = ev?.message?.content ?? ev?.content ?? [];
    const items = Array.isArray(content) ? content : [content];
    return items.some((item) => isToolResultType(item?.type));
  }

  function markToolRunning(el) {
    if (!el || el.classList.contains("running")) return;
    el.classList.add("running");
    if (!el.querySelector(".tool-spinner")) {
      const spinner = document.createElement("span");
      spinner.className = "tool-spinner";
      el.appendChild(spinner);
    }
  }

  function cssEscapeValue(value) {
    if (window.CSS?.escape) return CSS.escape(value);
    return String(value).replace(/["\\]/g, "\\$&");
  }

  function markLiveToolBlocksRunning(blocks) {
    if (!assistantEl) return;
    for (const block of blocks || []) {
      if (!isToolUseType(block.type)) continue;
      const selector = block.id
        ? `.tool-call[data-tool-id="${cssEscapeValue(block.id)}"]`
        : ".tool-call:last-of-type";
      const el = assistantEl.querySelector(selector);
      markToolRunning(el);
    }
  }

  function cleanupRunningTools() {
    if (!assistantEl) return;
    assistantEl.querySelectorAll(".tool-call.running").forEach(el => {
    el.classList.remove("running");
    el.querySelector(".tool-spinner")?.remove();
  });
}

function resetAssistantState() {
  cleanupRunningTools();
  removeGenChip();
  assistantEl = null; assistantTxt = ""; assistantBlocks = []; assistantRawMessages = []; assistantEvents = []; blockMap = {}; prevTurnTexts = [];
}

function captureAssistantEvent(ev) {
  if (!ev?.type || ev.type === "user") return;
  const raw = cloneJson(ev);
  const block = { type: "sdk_event", eventType: ev.type, raw };
  assistantEvents.push(raw);
  assistantBlocks.push(block);
  if (!assistantEl) { removeTyping(); assistantEl = addMessage("assistant", ""); }
  if (!genChipEl && isGenerating) showGenChip("");
  const body = assistantEl.querySelector(".msg-body");
  appendAssistantBlock(body, block);
  reanchorGenChip();
  scrollBottom();
}

function parseResetDate(value) {
  if (!value) return "";
  const numeric = typeof value === "number" ? value : Number(value);
  const ms = Number.isFinite(numeric)
    ? (numeric < 10_000_000_000 ? numeric * 1000 : numeric)
    : value;
  const date = new Date(ms);
  return Number.isNaN(date.getTime()) ? null : date;
}

function formatResetCountdown(value, format = "hm") {
  const date = parseResetDate(value);
  if (!date) return "";
  const diffMs = date.getTime() - Date.now();
  if (format === "dh") {
    if (diffMs <= 0) return "0d0h";
    const totalHours = Math.max(1, Math.ceil(diffMs / 3_600_000));
    const days = Math.floor(totalHours / 24);
    const hours = totalHours % 24;
    return `${days}d${hours}h`;
  }
  if (diffMs <= 0) return "0h00min";
  const totalMinutes = Math.max(1, Math.ceil(diffMs / 60_000));
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return `${hours}h${String(minutes).padStart(2, "0")}min`;
}

function formatResetTime(value) {
  const date = parseResetDate(value);
  if (!date) return "";
  return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function updateRateLimit(info) {
  if (info) mergeClaudeRateLimitInfo(info);
}

// ── Event handling ────────────────────────────────────────
function handleEvent(ev) {
  lastWsEventAt = Date.now();

  if (ev.type === "ask_user_question") {
    renderAskUserQuestion(ev);
    return;
  }

  if (ev.type === "ask_user_question_cancelled") {
    if (!pendingAskUserQuestion || pendingAskUserQuestion.requestId === ev.requestId) {
      clearAskUserQuestion();
      updateGenChip("已取消");
    }
    return;
  }

  if (ev.type === "ask_user_question_error") {
    if (!pendingAskUserQuestion || pendingAskUserQuestion.requestId === ev.requestId) clearAskUserQuestion();
    showInlineError(ev.text || "问题已过期，请重新发送消息。");
    return;
  }

  if (ev.type === "system" && ev.subtype === "api_retry") {
    updateTypingStatus(`API 繁忙，正在重试 (${ev.attempt}/${ev.max_retries})…`);
    return;
  }

  if (ev.type === "system" && ev.subtype === "status") {
    const STATUS_LABEL = { compacting: "压缩上下文中…", requesting: "请求中…" };
    updateTypingStatus(STATUS_LABEL[ev.status] ?? "");
    return;
  }

  if (ev.type === "system" && ev.subtype === "init") {
    // ev.skills 是实际的技能列表；ev.slash_commands 是内置命令列表
    // 优先使用 ev.skills，否则回退到 ev.slash_commands（旧版 SDK 兼容）
    if (ev.provider) currentSkillProvider = ev.provider;
    const skillList = Array.isArray(ev.skills) && ev.skills.length > 0
      ? ev.skills
      : (Array.isArray(ev.slash_commands) ? ev.slash_commands : []);
    buildCommandList(skillList);
    return;
  }

  if (ev.type === "rate_limit_event") {
    updateRateLimit(ev.rate_limit_info);
    return;
  }

  // ── Streaming deltas ──────────────────────────────────────
  if (ev.type === "stream_event") {
    const event = ev.event;
    if (!event) return;

    // New turn after tool call — tool finished, remove running state, reset indices
    if (event.type === "message_start") {
      cleanupRunningTools();
      updateGenChip("继续处理…");
      for (const b of Object.values(blockMap)) {
        if (b.type === "text" && b.accumulated) prevTurnTexts.push(b.accumulated);
      }
      blockMap = {};
      return;
    }

    // New block — create DOM element in arrival order and append to body
    if (event.type === "content_block_start") {
      const block = event.content_block;
      if (!block) return;
      const idx = event.index;
      if (!assistantEl) { removeTyping(); assistantEl = addMessage("assistant", ""); }
      if (!genChipEl) showGenChip("");
      const body = assistantEl.querySelector(".msg-body");

      if (block.type === "thinking") {
        removeGenChip();
        const el = document.createElement("details");
        el.className = "thinking-block thinking-active";
        el.setAttribute("open", "");
        el.innerHTML = `<summary class="thinking-summary"><span class="thinking-dot"></span><span class="thinking-label">正在思考</span><span class="thinking-chevron">▶</span></summary><div class="thinking-content"></div>`;
        body.appendChild(el);
        blockMap[idx] = { el, type: "thinking", accumulated: "" };
      } else if (block.type === "text") {
        updateGenChip("");
        const el = document.createElement("div");
        el.className = "msg-text";
        body.appendChild(el);
        reanchorGenChip();
        blockMap[idx] = { el, type: "text", accumulated: "" };
      } else if (isToolUseType(block.type)) {
        updateGenChip("调用工具中…");
        const el = makeToolEl({
          id: block.id,
          name: block.name,
          serverName: block.server_name ?? block.serverName ?? null,
          input: block.input ?? {},
        });
        body.appendChild(el);
        reanchorGenChip();
        markToolRunning(el);
        blockMap[idx] = { el, type: block.type, accumulated: "", id: block.id };
      } else if (block.type === "web_search_tool_result" || block.type === "web_fetch_tool_result" || isToolResultType(block.type)) {
        cleanupRunningTools();
        const el = makeHistoryBlock(blockTypeLabel(block.type), block);
        body.appendChild(el);
        reanchorGenChip();
        blockMap[idx] = { el, type: block.type, accumulated: "", raw: block };
      } else {
        const el = makeHistoryBlock(blockTypeLabel(block.type), block);
        body.appendChild(el);
        reanchorGenChip();
        blockMap[idx] = { el, type: block.type || "unknown", accumulated: "", raw: block };
      }
      return;
    }

    // Delta — stream content into the existing element
    if (event.type === "content_block_delta") {
      const { delta, index: idx } = event;
      if (!delta || !blockMap[idx]) return;
      const b = blockMap[idx];

      if (delta.type === "text_delta" && delta.text) {
        b.accumulated += delta.text;
        b.el.innerHTML = renderMarkdown(b.accumulated);
        assistantTxt = [...prevTurnTexts,
          ...Object.values(blockMap).filter(x => x.type === "text").map(x => x.accumulated),
        ].filter(Boolean).join("\n\n");
        scrollBottom();
      } else if (delta.type === "thinking_delta" && delta.thinking) {
        b.accumulated += delta.thinking;
        const tc = b.el.querySelector(".thinking-content");
        tc.textContent = b.accumulated;
        tc.scrollTop = tc.scrollHeight;
        scrollBottom();
      } else if (delta.type === "input_json_delta" && delta.partial_json != null) {
        b.accumulated += delta.partial_json;
        const inp = b.el.querySelector(".tool-input");
        if (inp) { inp.textContent = b.accumulated.slice(0, 120); scrollBottom(); }
      }
      return;
    }

    // Block complete — finalise tool input, then mark chip as running
    if (event.type === "content_block_stop") {
      const b = blockMap[event.index];
      if (b?.type === "thinking") {
        // 思考结束：去掉动画，折叠，改回"思考过程"
        b.el.classList.remove("thinking-active");
        b.el.removeAttribute("open");
        const label = b.el.querySelector(".thinking-label");
        if (label) label.textContent = "思考过程";
        showGenChip("整理回复中…");
      }
      if (isToolUseType(b?.type)) {
        try {
          const raw = JSON.parse(b.accumulated || "{}");
          const preview = raw.command ?? raw.file_path ?? raw.path ?? raw.query ?? JSON.stringify(raw);
          const inp = b.el.querySelector(".tool-input");
          if (inp) { inp.textContent = String(preview).slice(0, 120); inp.title = JSON.stringify(raw, null, 2); }
        } catch { }
        // 输入完成 → 工具执行中，保持 spinner
        markToolRunning(b.el);
      }
      return;
    }
    return;
  }

  // ── Complete assistant turn ────────────────────────────────
  if (ev.type === "assistant") {
    const content = ev.message?.content ?? [];
    const turnBlocks = normalizeAssistantBlocks(content, "");
    if (turnBlocks.length) assistantBlocks.push(...turnBlocks);
    assistantRawMessages.push(cloneJson(ev.message ?? ev));

    if (!assistantEl) {
      // No streaming — render each block in order
      removeTyping();
      assistantEl = addMessage("assistant", "");
    }
    if (!genChipEl && isGenerating) showGenChip("");
    const body = assistantEl.querySelector(".msg-body");
    if (!assistantBlocks.some((block) => block.type === "text") && assistantTxt) {
      assistantBlocks.push({ type: "text", text: assistantTxt });
    }
    body.innerHTML = "";
    renderAssistantBlocks(body, assistantBlocks);
    reanchorGenChip();
    markLiveToolBlocksRunning(turnBlocks);
    assistantTxt = textFromAssistantBlocks(assistantBlocks) || assistantTxt;
    scrollBottom();
    return;
  }

  if (ev.type === "user" && isToolResultEvent(ev)) {
    cleanupRunningTools();
    return;
  }

  if (isToolUseType(ev.type)) {
    if (!assistantEl) { removeTyping(); assistantEl = addMessage("assistant", ""); }
    if (!genChipEl && isGenerating) showGenChip("调用工具中…");
    const block = {
      type: ev.type,
      id: ev.id ?? "",
      name: ev.name ?? "tool",
      serverName: ev.server_name ?? ev.serverName ?? null,
      input: ev.input ?? {},
      raw: cloneJson(ev),
    };
    assistantBlocks.push(block);
    const el = makeToolEl(block);
    const body = assistantEl.querySelector(".msg-body");
    body.appendChild(el);
    reanchorGenChip();
    markToolRunning(el);
    scrollBottom();
    return;
  }

  if (isToolResultType(ev.type)) {
    cleanupRunningTools();
    if (!assistantEl) { removeTyping(); assistantEl = addMessage("assistant", ""); }
    if (!genChipEl && isGenerating) showGenChip("");
    const block = { type: ev.type, raw: cloneJson(ev) };
    assistantBlocks.push(block);
    const body = assistantEl.querySelector(".msg-body");
    appendAssistantBlock(body, block);
    reanchorGenChip();
    scrollBottom();
    return;
  }

  if (ev.type === "result") {
    const savedText = assistantTxt;
    const savedBlocks = cloneJson(assistantBlocks);
    const savedRawMessages = cloneJson(assistantRawMessages);
    const savedEvents = cloneJson(assistantEvents);
    let resultCost = null;
    if (ev.total_cost_usd != null) {
      resultCost = ev.total_cost_usd;
    }
    resetAssistantState();
    if (savedText || savedBlocks?.length) {
      messageLog.push({ role: "assistant", text: savedText, blocks: savedBlocks, raw: savedRawMessages, events: savedEvents, cost: resultCost });
      saveCurrentConversation();
    }
    return;
  }

  if (ev.type === "done" || ev.type === "stopped") {
    clearAskUserQuestion();
    resetAssistantState();
    setGenerating(false); removeTyping();
    return;
  }

  if (ev.type === "error") {
    clearAskUserQuestion();
    cleanupRunningTools();
    showInlineError(ev.text?.trim() || "发生错误");
    setGenerating(false); removeTyping();
  }

  if (ev.type === "session" && ev.sessionId) {
    currentSessionId = ev.sessionId;
    currentSessionProvider = ev.provider === "codex" ? "codex" : "claude";
    alignProfileToSessionProvider(currentSessionProvider);
    return;
  }

  captureAssistantEvent(ev);
}

// ── DOM helpers ───────────────────────────────────────────
function addMessage(role, text, imageUrls) {
  const wrap = document.createElement("div");
  wrap.className = `msg msg-${role}`;
  const body = document.createElement("div");
  body.className = "msg-body";
  if (imageUrls?.length) {
    const imgRow = document.createElement("div");
    imgRow.style.cssText = "display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;";
    imageUrls.forEach(url => {
      const img = document.createElement("img");
      img.src = url;
      img.style.cssText = "max-height:160px;max-width:100%;border-radius:5px;object-fit:cover;";
      imgRow.appendChild(img);
    });
    body.appendChild(imgRow);
  }
  // For assistant, only add initial text element if there's actual text (shell calls pass "")
  if (role !== "assistant" || text) {
    const textEl = document.createElement("div");
    textEl.className = role === "assistant" ? "msg-text" : "";
    textEl.innerHTML = role === "assistant" ? renderMarkdown(text) : renderPlain(text);
    if (role === "user") textEl.style.whiteSpace = "pre-wrap";
    body.appendChild(textEl);
  }
  wrap.appendChild(body);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function makeToolEl(tool) {
  const el = document.createElement("div");
  el.className = "tool-call";
  el.dataset.toolId = tool.id;
  const name = document.createElement("span");
  name.className = "tool-name";
  name.textContent = tool.serverName ? `${tool.serverName}:${tool.name}` : tool.name;
  const inp = document.createElement("span");
  inp.className = "tool-input";
  const raw = tool.input ?? {};
  const preview = raw.command ?? raw.file_path ?? raw.path ?? raw.query ?? JSON.stringify(raw);
  inp.textContent = String(preview).slice(0, 120);
  inp.title = JSON.stringify(raw, null, 2);
  el.appendChild(name); el.appendChild(inp);
  return el;
}

function makeHistoryBlock(label, raw, leadText = "") {
  const el = document.createElement("details");
  el.className = "history-block";
  const summary = document.createElement("summary");
  summary.textContent = label;
  const content = document.createElement("div");
  content.className = "history-block-content";
  const rawText = jsonPreview(raw);
  content.textContent = leadText ? `${leadText}\n\n${rawText}` : rawText;
  el.appendChild(summary);
  el.appendChild(content);
  return el;
}

function extractResultItems(raw) {
  const content = raw?.content ?? raw?.raw?.content ?? [];
  if (Array.isArray(content)) return content;
  if (content && typeof content === "object") return [content];
  return [];
}

function makeSearchResultBlock(block) {
  const raw = block.raw ?? block;
  const el = document.createElement("details");
  el.className = "history-block";
  const summary = document.createElement("summary");
  summary.textContent = blockTypeLabel(block.type);
  el.appendChild(summary);

  const results = extractResultItems(raw);
  if (results.length) {
    const list = document.createElement("div");
    list.className = "history-block-results";
    for (const item of results.slice(0, 8)) {
      const row = document.createElement("div");
      row.className = "history-result";
      const title = document.createElement("div");
      title.className = "history-result-title";
      title.textContent = item.title || item.type || "结果";
      row.appendChild(title);
      if (item.url) {
        const url = document.createElement("div");
        url.className = "history-result-url";
        url.textContent = item.url;
        row.appendChild(url);
      }
      if (item.page_age) {
        const age = document.createElement("div");
        age.className = "history-result-url";
        age.textContent = item.page_age;
        row.appendChild(age);
      }
      list.appendChild(row);
    }
    el.appendChild(list);
  }

  const rawEl = document.createElement("div");
  rawEl.className = "history-block-content";
  rawEl.textContent = jsonPreview(raw);
  el.appendChild(rawEl);
  return el;
}

function addTyping() {
  removeTyping();
  const el = document.createElement("div");
  el.id = "typing"; el.className = "msg";
  el.innerHTML = `<div class="typing"><span></span><span></span><span></span><small class="typing-status"></small></div>`;
  messagesEl.appendChild(el); scrollBottom();
}
function removeTyping() { document.getElementById("typing")?.remove(); }

function showGenChip(text) {
  if (!genChipEl) {
    genChipEl = document.createElement("div");
    genChipEl.className = "gen-chip";
    genChipEl.innerHTML = `<span class="gen-chip-dot"></span><span class="gen-chip-label"></span>`;
  }
  genChipEl.querySelector(".gen-chip-label").textContent = text || "";
  reanchorGenChip();
}
function updateGenChip(text) {
  if (!genChipEl) return;
  genChipEl.querySelector(".gen-chip-label").textContent = text || "";
  reanchorGenChip();
}
function reanchorGenChip() {
  if (!genChipEl || !assistantEl) return;
  const body = assistantEl.querySelector(".msg-body");
  if (body) body.appendChild(genChipEl);
}
function removeGenChip() {
  genChipEl?.remove();
  genChipEl = null;
}

function updateTypingStatus(text) {
  const el = document.querySelector("#typing .typing-status");
  if (el) el.textContent = text ? ` ${text}` : "";
}
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }


// ── Composer popup: slash commands + @ note mentions ─────
let popupItems  = [];
let activeIndex = -1;
let popupMode = null;
let activeMentionRange = null;
let composerPopupRevision = 0;
const MENTION_KIND_LABELS = { markdown: "MD", html: "HTML", pdf: "PDF", image: "图片" };

function getSlashQuery() {
  const val = promptEl.value;
  if (!val.startsWith("/")) return null;
  const afterSlash = val.slice(1);
  // hide once user typed a space (they've committed to a command)
  if (afterSlash.includes(" ")) return null;
  return afterSlash.toLowerCase();
}

function highlightPopupMatch(value, query) {
  const text = String(value);
  if (!query) return escapeHtml(text);
  const index = text.toLocaleLowerCase().indexOf(String(query).toLocaleLowerCase());
  if (index < 0) return escapeHtml(text);
  return escapeHtml(text.slice(0, index))
    + `<em>${escapeHtml(text.slice(index, index + query.length))}</em>`
    + escapeHtml(text.slice(index + query.length));
}

function renderSlashPopup(query) {
  const matches = slashCommands.filter((c) =>
    query === "" || c.name.toLowerCase().includes(query)
  );

  if (matches.length === 0) { hidePopup(); return; }

  popupItems = matches;
  activeIndex = 0;
  popupMode = "slash";
  activeMentionRange = null;

  const builtins = matches.filter((c) => c.kind === "builtin");
  const skills   = matches.filter((c) => c.kind === "skill");

  let idx = 0;
  const renderGroup = (label, items) => {
    if (!items.length) return "";
    let html = `<div class="slash-header">${label}</div>`;
    for (const c of items) {
      const highlighted = query
        ? c.name.replace(new RegExp(`(${query})`, "i"), "<em>$1</em>")
        : c.name;
      const badge = c.kind === "builtin"
        ? `<span class="slash-badge builtin">内置</span>`
        : `<span class="slash-badge skill">skill</span>`;
      html += `<button class="slash-item${idx === 0 ? " active" : ""}" data-i="${idx++}" role="option">
        <span class="slash-cmd">/${highlighted}</span>
        ${c.desc ? `<span class="slash-desc">${c.desc}</span>` : ""}
        ${badge}
      </button>`;
    }
    return html;
  };

  popupEl.innerHTML =
    renderGroup("内置命令", builtins) +
    renderGroup("Skills", skills);

  popupEl.setAttribute("aria-label", "命令列表");
  popupEl.classList.add("open");
}

function getMentionQuery() {
  const cursor = promptEl.selectionStart ?? promptEl.value.length;
  const beforeCursor = promptEl.value.slice(0, cursor);
  const mentionStart = beforeCursor.lastIndexOf("@");
  if (mentionStart < 0) return null;
  if (mentionStart > 0 && !/[\s([{"'“‘，。！？、；：]/u.test(beforeCursor[mentionStart - 1])) return null;

  const query = beforeCursor.slice(mentionStart + 1);
  if (query.includes("\n") || query.length > 80) return null;
  return { query, start: mentionStart, end: cursor };
}

function mentionScore(note, query) {
  if (!query) return 4;
  if (note.searchTitle === query || note.searchAliases.includes(query)) return 0;
  if (note.searchTitle.startsWith(query)) return 1;
  if (note.searchAliases.some((alias) => alias.startsWith(query))) return 2;
  if (note.searchPath.startsWith(query)) return 3;
  return 4;
}

function renderMentionState(mention, message, { retry = false } = {}) {
  popupItems = [];
  activeIndex = -1;
  popupMode = "mention-state";
  activeMentionRange = mention;
  popupEl.innerHTML = `
    <div class="slash-header">添加文件上下文</div>
    <div class="mention-popup-state">
      <span>${escapeHtml(message)}</span>
      ${retry ? '<button type="button" class="mention-popup-retry">重试</button>' : ""}
    </div>`;
  popupEl.setAttribute("aria-label", "文件引用状态");
  popupEl.classList.add("open");
}

function renderMentionPopup(mention) {
  const query = normalizeMentionSearch(mention.query);
  const matches = mentionEntries
    .filter((note) => !selectedMentionFiles.has(note.path))
    .filter((note) => !query
      || note.searchTitle.includes(query)
      || note.searchPath.includes(query)
      || note.searchAliases.some((alias) => alias.includes(query)))
    .sort((a, b) => mentionScore(a, query) - mentionScore(b, query)
      || a.title.localeCompare(b.title, "zh-CN"))
    .slice(0, 20);

  if (matches.length === 0) {
    renderMentionState(mention, query ? "未找到匹配文件" : "没有可引用的文件");
    return;
  }

  popupItems = matches;
  activeIndex = 0;
  popupMode = "mention";
  activeMentionRange = mention;
  popupEl.innerHTML = `
    <div class="slash-header">添加文件上下文</div>
    ${matches.map((note, index) => `
      <button class="slash-item mention-item${index === 0 ? " active" : ""}" data-i="${index}" role="option">
        <span class="slash-cmd">${highlightPopupMatch(note.title, mention.query)}</span>
        <span class="slash-desc" title="${escapeAttr(note.path)}">${escapeHtml(note.path)}</span>
        <span class="slash-badge note">${MENTION_KIND_LABELS[note.kind]}</span>
      </button>
    `).join("")}`;
  popupEl.setAttribute("aria-label", "文件列表");
  popupEl.classList.add("open");
}

function hidePopup() {
  composerPopupRevision += 1;
  popupEl.classList.remove("open");
  popupItems = [];
  activeIndex = -1;
  popupMode = null;
  activeMentionRange = null;
}

function loadAndRenderMentionIndex(mention, { force = false, showLoading = true } = {}) {
  const revision = ++composerPopupRevision;
  if (showLoading) {
    renderMentionState(mention, force ? "正在重新加载文件…" : "正在加载文件…");
  }
  let request;
  try {
    request = loadMentionIndex({ force });
  } catch (error) {
    if (showLoading && revision === composerPopupRevision) {
      renderMentionState(
        getMentionQuery() ?? mention,
        error?.message || "文件索引加载失败",
        { retry: true },
      );
    }
    return;
  }
  void request
    .then(() => {
      if (revision === composerPopupRevision) {
        renderMentionPopup(getMentionQuery() ?? mention);
      }
    })
    .catch((error) => {
      if (!showLoading) return;
      if (revision === composerPopupRevision) {
        renderMentionState(
          getMentionQuery() ?? mention,
          error?.message || "文件索引加载失败",
          { retry: true },
        );
      }
    });
}

function setActive(i) {
  const items = popupEl.querySelectorAll(".slash-item");
  items.forEach((el, idx) => el.classList.toggle("active", idx === i));
  activeIndex = i;
  items[i]?.scrollIntoView({ block: "nearest" });
}

function selectItem(i) {
  const item = popupItems[i];
  if (!item) return;
  if (popupMode === "mention") {
    const range = activeMentionRange;
    if (!range) return;
    selectedMentionFiles.set(item.path, item);
    promptEl.setRangeText("", range.start, range.end, "end");
    promptEl.style.height = "36px";
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + "px";
    renderMentionChips();
    hidePopup();
    promptEl.focus();
    return;
  }
  // /clear is handled locally; everything else is sent to claude
  if (item.name === "clear") {
    saveCurrentConversation();
    clearAskUserQuestion();
    messagesEl.innerHTML = "";
    messageLog = []; currentConvId = null; currentSessionId = null; currentSessionProvider = null;
    promptEl.value = "";
    promptEl.style.height = "36px";
    clearMentionFiles();
    hidePopup();
    ws?.send(JSON.stringify({ reset: true }));
    return;
  }
  // commands with no args: send immediately; skills need args typed first
  promptEl.value = `/${item.name}${item.kind === "builtin" ? "" : " "}`;
  promptEl.style.height = "36px";
  hidePopup();
  promptEl.focus();
}

    if (!mention) return;

promptEl.addEventListener("input", () => {
  promptEl.style.height = "36px";
  promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + "px";

  const mention = getMentionQuery();
  if (mention) {
    if (mentionIndexState === "ready") {
      renderMentionPopup(mention);
      if (Date.now() - mentionIndexLoadedAt >= MENTION_INDEX_TTL_MS) {
        loadAndRenderMentionIndex(mention, { showLoading: false });
      }
      return;
    }
    if (mentionIndexState === "error") {
      renderMentionState(mention, mentionIndexError || "文件索引加载失败", { retry: true });
      return;
    }
    loadAndRenderMentionIndex(mention);
    return;
  }
  const slashQuery = getSlashQuery();
  if (slashQuery !== null) renderSlashPopup(slashQuery);
  else hidePopup();
});

promptEl.addEventListener("keydown", (e) => {
  if (e.isComposing) return;
  if (popupEl.classList.contains("open")) {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setActive(Math.min(activeIndex + 1, popupItems.length - 1));
      return;
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      setActive(Math.max(activeIndex - 1, 0));
      return;
    }
    if (e.key === "Enter" || e.key === "Tab") {
      e.preventDefault();
      selectItem(activeIndex);
      return;
    }
    if (e.key === "Escape") {
      e.preventDefault();
      hidePopup();
      return;
    }
  }

  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// ── Send ──────────────────────────────────────────────────
function send() {
  const text = promptEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  if (text === "/clear") {
    saveCurrentConversation();
    clearAskUserQuestion();
    messagesEl.innerHTML = "";
    messageLog = []; currentConvId = null; currentSessionId = null; currentSessionProvider = null;
    promptEl.value = "";
    promptEl.style.height = "36px";
    clearMentionFiles();
    ws.send(JSON.stringify({ reset: true }));
    hidePopup();
    return;
  }

  hidePopup();
  clearAskUserQuestion();
  const mentionedFiles = [...selectedMentionFiles.values()];
  if (!currentConvId) currentConvId = genId();
  const imagePreviewUrls = pendingImages.map(img => img.previewUrl);
  // If a previous request froze without a done/stopped event, assistantEl still
  // points to the old AI message element. Clear it so the upcoming response is
  // appended after this new user message, not inside the old AI bubble.
  resetAssistantState();
  const displayText = mentionedFiles.length > 0
    ? `${text}\n\n引用文件：${mentionedFiles.map((file) => `@${file.title}`).join(" · ")}`
    : text;
  addMessage("user", displayText, imagePreviewUrls);
  messageLog.push({ role: "user", text: displayText, cost: null });
  promptEl.value = "";
  promptEl.style.height = "36px";
  addTyping();
  setGenerating(true);
  lastWsEventAt = Date.now();

  const parts = [];
  if (currentNoteFile && noteContextEnabled) parts.push(`当前查看的文件：${currentNoteFile}`);
  if (mentionedFiles.length > 0) {
    parts.push(
      "用户指定以下 vault 文件作为本轮上下文。请优先读取这些文件，并基于其中内容回答：\n"
      + mentionedFiles.map((file) => `- ${JSON.stringify(file.path)}`).join("\n"),
    );
    clearMentionFiles();
  }
  if (quotedText) {
    const sectionHint = quotedSection ? `（「${quotedSection}」章节）` : "";
    let anchor = "";
    if (quotedPrefix || quotedSuffix) {
      const pre = quotedPrefix ? `…${quotedPrefix}` : "";
      const suf = quotedSuffix ? `${quotedSuffix}…` : "";
      anchor = `\n位置锚点：${pre}【${quotedText}】${suf}`;
    }
    parts.push(`用户引用了以下文段${sectionHint}：\n"${quotedText}"${anchor}`);
    quotedText = null;
    quotedSection = null;
    quotedPrefix = null;
    quotedSuffix = null;
    quoteChip.classList.remove("visible");
  }
  parts.push(text);
  const wsPayload = {
    prompt: parts.join("\n\n"),
    model: selectedModel,
    permissionMode: selectedPermissionMode,
    effort: selectedEffort,
    profileId: _profileData.activeProfileId,
  };
  if (pendingImages.length > 0) {
    wsPayload.images = pendingImages.map(img => ({ data: img.data, mediaType: img.mediaType }));
    clearImages();
  }
  ws.send(JSON.stringify(wsPayload));
}

// ── Git Change Banner ─────────────────────────────────────────
(function() {
  const banner   = document.getElementById("git-banner");
  const labelBtn = document.getElementById("git-banner-label");
  const syncBtn  = document.getElementById("git-banner-sync");
  let pendingFiles = [];
  let syncTimer = null;

  function stripExt(name) { return name.replace(/\.(md|html?)$/i, ""); }

  const GIT_STATE_LABEL = { modified: "已修改", added: "新增", deleted: "已删除", renamed: "已重命名" };

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
  }

  function renderBanner(files) {
    pendingFiles = files;
    if (!files.length) { banner.classList.remove("visible"); return; }
    banner.classList.add("visible");
    if (files.length === 1) {
      const tag = GIT_STATE_LABEL[files[0].state] || "改动";
      labelBtn.innerHTML = '<span id="git-banner-tag">' + tag + "</span>"
        + escapeHtml(stripExt(files[0].name));
    } else {
      labelBtn.textContent = files.length + " 处改动";
    }
  }

  function setFeedback(text, duration) {
    labelBtn.textContent = text;
    if (syncTimer) clearTimeout(syncTimer);
    if (duration) syncTimer = setTimeout(() => renderBanner(pendingFiles), duration);
  }

  async function fetchStatus() {
    try {
      const res = await fetch("/api/notes/git", { cache: "no-store" });
      const data = await res.json();
      if (!data.error) renderBanner(data.files || []);
    } catch {}
  }

  async function handleSync() {
    banner.classList.add("syncing");
    syncBtn.disabled = true;
    setFeedback("检查云端版本…");
    try {
      await fetch("/api/notes/git", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ action: "pull" }),
      });
      setFeedback("AI 提炼同步摘要…");
      let message = "";
      try {
        const ai = await fetch("/api/notes/git/ai-log", { method: "POST" });
        const d = await ai.json();
        message = d.message || d.fallback || "";
      } catch {}
      if (!message) message = "同步笔记于 " + new Date().toLocaleDateString("zh-CN");
      setFeedback("保存「" + message + "」…");
      const res = await fetch("/api/notes/git", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ action: "push", message }),
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      setFeedback("云端同步成功 ✓", 3000);
      await fetchStatus();
    } catch (err) {
      setFeedback(err.message || "同步失败", 4000);
    } finally {
      banner.classList.remove("syncing");
      syncBtn.disabled = false;
    }
  }

  labelBtn.addEventListener("click", () => {
    window.parent.postMessage({ type: "open-git-tab" }, "*");
  });
  syncBtn.addEventListener("click", () => void handleSync());

  fetchStatus();
  setInterval(fetchStatus, 30000);
})();

// ── Visual viewport fix (mobile keyboard avoidance) ───────────
// On iOS Safari the layout viewport does NOT shrink when the virtual keyboard
// appears — the keyboard just overlays the page. But visualViewport.height DOES
// shrink. We track it and resize #app accordingly so that #messages (flex:1)
// auto-shrinks and #input-wrap stays pinned above the keyboard.
const _appEl = document.getElementById("app");
// When embedded inside the inkfellow notes drawer (an <iframe>), the parent page
// already lifts the whole drawer above the keyboard via --keyboard-height. Here in
// the iframe, window.visualViewport.height reports the *full-screen* visible height,
// not this drawer's height — so self-managing #app height would double-compensate in
// the wrong reference frame and leave the input mispositioned. Only own keyboard
// avoidance when we are the top-level page; otherwise let #app fill the iframe
// (CSS height:100%) so #input-wrap pins to the drawer's bottom edge.
const _embedded = window.self !== window.top;
let _lastVVHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

function syncHeight() {
  const vv = window.visualViewport;
  if (!vv) { _appEl.style.height = ""; return; }
  const h = vv.height;
  _appEl.style.height = h + "px";
  if (h < _lastVVHeight) scrollBottom();
  _lastVVHeight = h;
}

function onKeyboardScroll() {
  const vv = window.visualViewport;
  if (!vv) return;
  if (vv.height < _lastVVHeight) scrollBottom();
  _lastVVHeight = vv.height;
}

if (window.visualViewport) {
  const handler = _embedded ? onKeyboardScroll : syncHeight;
  window.visualViewport.addEventListener("resize", handler, { passive: true });
  window.visualViewport.addEventListener("scroll", handler, { passive: true });
}
if (!_embedded) syncHeight();
else _appEl.style.height = "";

    send();
  }
});

function positionHeaderDropdown(btn, dropdown, align = "left", upward = false) {
  dropdown.classList.add("open");
  const rect = btn.getBoundingClientRect();
  const width = dropdown.offsetWidth;
  const viewportWidth = window.innerWidth;
  let left = align === "right" ? rect.right - width : rect.left;
  left = Math.max(8, Math.min(left, viewportWidth - width - 8));
  dropdown.style.left = `${left}px`;
  if (upward) {
    dropdown.classList.add("open-up");
    dropdown.style.top = "auto"; // must override CSS `top:0`
    dropdown.style.bottom = `${window.innerHeight - rect.top + 5}px`;
    dropdown.style.maxHeight = `${rect.top - 16}px`;
  } else {
    const viewportHeight = window.innerHeight;
    dropdown.style.bottom = "auto";
    dropdown.style.maxHeight = `${viewportHeight - rect.bottom - 16}px`;
    dropdown.style.top = `${Math.min(rect.bottom + 5, viewportHeight - 12)}px`;
  }
}

function toggleHeaderPicker(btn, dropdown, align = "left", upward = false) {
  const wasOpen = dropdown.classList.contains("open");

  if (wasOpen) return;
  btn.classList.add("open");

function setPickerOptions(dropdown, optionSelector, activeEl, valueAttr) {
  dropdown.querySelectorAll(optionSelector).forEach(el => {
    el.classList.toggle("active", el === activeEl);

  });
  return activeEl.dataset[valueAttr];
}

function restorePicker(dropdown, optionSelector, attrName, value, labelEl) {
  const opt = dropdown.querySelector(`${optionSelector}[data-${attrName}="${value}"]`);
  if (!opt) return null;
  labelEl.textContent = opt.dataset.label;
  dropdown.querySelectorAll(optionSelector).forEach(el => {
    el.classList.toggle("active", el === opt);
    el.setAttribute("aria-selected", el === opt ? "true" : "false");
  });
  return opt;
}

    blocks: m.blocks ?? null,
    raw: m.raw ?? null,
    events: m.events ?? null,
    cost: m.cost ?? null,
  }));
  for (const msg of conv.messages) {
    const hasAssistantBlocks = msg.role === "assistant" && Array.isArray(msg.blocks) && msg.blocks.length > 0;
    const el = addMessage(msg.role, hasAssistantBlocks ? "" : msg.text);
    if (hasAssistantBlocks) {
      renderAssistantBlocks(el.querySelector(".msg-body"), msg.blocks);
    }
  }
  currentConvId = conv.id;
  currentSessionId = conv.sessionId;
  const savedProfile = _profileData.profiles.find(p => p.id === conv.profileId);
  currentSessionProvider = conv.sessionProvider === "codex"
    ? "codex"
    : conv.sessionProvider === "claude"
      ? "claude"
      : savedProfile
        ? (savedProfile.provider === "codex" ? "codex" : "claude")
        : null;
  if (currentSessionProvider) {
    alignProfileToSessionProvider(currentSessionProvider, conv.profileId);
  }
  if (conv.sessionId && ws && ws.readyState === WebSocket.OPEN) {
    const payload = {
      setSession: conv.sessionId,
    };
    if (currentSessionProvider) payload.sessionProvider = currentSessionProvider;
    ws.send(JSON.stringify(payload));
  } else if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ reset: true }));
  }
  closeHistoryPanel();
  scrollBottom();
}

async function startNewConversation() {
  await saveCurrentConversation();
  clearAskUserQuestion();
  clearMentionFiles();
  messagesEl.innerHTML = "";
  messageLog = [];
  currentConvId = null;
  currentSessionId = null;
  currentSessionProvider = null;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ reset: true }));
  }
}

async function openHistoryPanel() {
  // 立即打开面板（无延迟）
  historyDropdown.classList.add("open");
  historyBackdrop.classList.add("open");
  notifyPanelOverlayState();
  closeHeaderPickers(); // 互斥
  // 有缓存先渲染缓存，同时后台刷新；没缓存才等 fetch
  if (_historyCache !== null) {
    renderHistoryFromData(_historyCache);
    renderHistoryList(); // 后台静默刷新
  } else {
    await renderHistoryList();
  }
}

function closeHistoryPanel() {
  historyDropdown.classList.remove("open");
  historyBackdrop.classList.remove("open");
  notifyPanelOverlayState();
}

function formatRelDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 1) return "刚刚";
  if (diffH < 24) return `${Math.floor(diffH)} 小时前`;
  const diffD = Math.floor(diffH / 24);
  if (diffD < 7) return `${diffD} 天前`;
  return d.toLocaleDateString("zh-CN", { month: "numeric", day: "numeric" });
}

// ── Action Sheet (mobile) ──────────────────────────────────
const _actionSheet = document.getElementById("action-sheet");
const _actionSheetBackdrop = document.getElementById("action-sheet-backdrop");
let _actionSheetConvId = null;

function openActionSheet(convId) {
  _actionSheetConvId = convId;
  _actionSheetBackdrop.classList.add("open");
  _actionSheet.classList.add("open");
}

function closeActionSheet() {
  _actionSheetBackdrop.classList.remove("open");
  _actionSheet.classList.remove("open");
  _actionSheetConvId = null;
}

_actionSheetBackdrop.addEventListener("click", closeActionSheet);
document.getElementById("action-sheet-cancel").addEventListener("click", closeActionSheet);

document.getElementById("action-sheet-delete").addEventListener("click", () => {
  const convId = _actionSheetConvId;
  closeActionSheet();
  if (!convId) return;
  const item = document.querySelector(`.history-item[data-id="${convId}"]`);
  if (item && !item.classList.contains("deleting")) {
    item.style.height = item.offsetHeight + "px";
    void item.offsetHeight;
    item.classList.add("deleting");
    item.style.height = "0px";
    setTimeout(() => deleteConversation(convId), 300);
  } else {
    deleteConversation(convId);
  }
});

document.getElementById("action-sheet-rename").addEventListener("click", () => {
  const convId = _actionSheetConvId;
  closeActionSheet();
  if (!convId) return;
  const item = document.querySelector(`.history-item[data-id="${convId}"]`);
  if (item) startInlineRename(item, convId);
});

function startInlineRename(item, convId) {
  const titleEl = item.querySelector(".history-item-title");
  if (!titleEl) return;
  const originalTitle = titleEl.textContent;
  const actionsEl = item.querySelector(".history-item-actions");
  const moreBtn = item.querySelector(".history-item-more");

  const input = document.createElement("input");
  input.className = "history-item-title-input";
  input.value = originalTitle;
  input.setAttribute("aria-label", "重命名对话");
  titleEl.replaceWith(input);
  if (actionsEl) actionsEl.style.visibility = "hidden";
  if (moreBtn) moreBtn.style.visibility = "hidden";
  input.focus();
  input.select();

  let committed = false;

  const commit = async () => {
    if (committed) return;
    committed = true;
    const newTitle = input.value.trim() || originalTitle;
    const newTitleEl = document.createElement("div");
    newTitleEl.className = "history-item-title";
    newTitleEl.textContent = newTitle;
    input.replaceWith(newTitleEl);
    if (actionsEl) actionsEl.style.visibility = "";
    if (moreBtn) moreBtn.style.visibility = "";
    if (newTitle !== originalTitle) {
      const conv = _historyCache?.find(h => h.id === convId);
      if (conv) {
        conv.title = newTitle;
        fetch(`api/history/${convId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(conv),
        }).catch(() => {});
      }
    }
  };

  const cancel = () => {
    if (committed) return;
    committed = true;
    const restoredEl = document.createElement("div");
    restoredEl.className = "history-item-title";
    restoredEl.textContent = originalTitle;
    input.replaceWith(restoredEl);
    if (actionsEl) actionsEl.style.visibility = "";
    if (moreBtn) moreBtn.style.visibility = "";
  };

  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") { ev.preventDefault(); commit(); }
    if (ev.key === "Escape") { ev.preventDefault(); cancel(); }
  });
  input.addEventListener("blur", commit);
}

function renderHistoryFromData(history) {
  const listEl = document.getElementById("history-list");
  if (history.length === 0) {
    listEl.innerHTML = '<div class="history-empty">暂无历史对话</div>';
    return;
  }
  const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  listEl.innerHTML = history.map(conv => {
    const isCurrent = conv.id === currentConvId;
    const msgCount = conv.messageCount ?? (conv.messages ? conv.messages.length : 0);
    return `<div class="history-item${isCurrent ? " current" : ""}" data-id="${conv.id}">
      <div class="history-item-info">
        <div class="history-item-title">${esc(conv.title || "对话")}</div>
        <div class="history-item-meta">${formatRelDate(conv.date)} · ${msgCount} 条消息</div>
      </div>
      <div class="history-item-actions">
        <button class="history-item-rename" data-rename="${conv.id}" title="重命名此对话" aria-label="重命名此对话">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M8.5 2L11 4.5L4.5 11H2V8.5L8.5 2Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="history-item-del" data-del="${conv.id}" title="删除此对话" aria-label="删除此对话">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M2 3.5h9M5.5 3.5V2.5h2v1M4 3.5l.6 7.5h3.8l.6-7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <button class="history-item-more" data-more="${conv.id}" aria-label="更多操作" title="更多操作">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <circle cx="8" cy="3" r="1.3"/><circle cx="8" cy="8" r="1.3"/><circle cx="8" cy="13" r="1.3"/>
        </svg>
      </button>
    </div>`;
  }).join("");

  listEl.querySelectorAll(".history-item").forEach(item => {
    item.addEventListener("click", async (e) => {
      if (e.target.closest(".history-item-del") || e.target.closest(".history-item-rename") || e.target.closest(".history-item-more") || e.target.closest(".history-item-title-input")) return;
      const conv = history.find(h => h.id === item.dataset.id);
      if (conv) loadConversation(conv);
    });
  });

  listEl.querySelectorAll(".history-item-del").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const item = btn.closest(".history-item");
      if (item && !item.classList.contains("deleting")) {
        item.style.height = item.offsetHeight + "px";
        void item.offsetHeight;
        item.classList.add("deleting");
        item.style.height = "0px";
        setTimeout(() => {
          deleteConversation(btn.dataset.del);
        }, 300);
      } else if (!item) {
        deleteConversation(btn.dataset.del);
      }
    });
  });

  listEl.querySelectorAll(".history-item-rename").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const item = btn.closest(".history-item");
      startInlineRename(item, btn.dataset.rename);
    });
  });

  listEl.querySelectorAll(".history-item-more").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const item = btn.closest(".history-item");
      openActionSheet(btn.dataset.more);
    });
  });
}

async function renderHistoryList() {
  const listEl = document.getElementById("history-list");
  if (_historyCache === null) {
    const skeletonItem = (w1, w2) =>
      `<div class="history-skeleton-item">
        <div class="history-skeleton-line" style="height:13px;width:${w1}%"></div>
        <div class="history-skeleton-line" style="height:10px;width:${w2}%"></div>
      </div>`;
    listEl.innerHTML = skeletonItem(68, 38) + skeletonItem(52, 44) + skeletonItem(75, 32);
  }
  const history = await fetchHistory();
  renderHistoryFromData(history);
}

document.getElementById("btn-history").addEventListener("click", (e) => {
  e.stopPropagation();
  if (historyDropdown.classList.contains("open")) closeHistoryPanel();
  else openHistoryPanel();
});
document.getElementById("btn-new").addEventListener("click", startNewConversation);
document.getElementById("history-close").addEventListener("click", closeHistoryPanel);
historyBackdrop.addEventListener("click", closeHistoryPanel);

// Rotating placeholder logic
(function initRotatingPlaceholder() {
  const promptEl = document.getElementById("prompt");
  if (!promptEl) return;
  const placeholders = [
    "Message inkfellow...",
    "试试输入：帮我修改这份文件...",
    "试试输入：根据这些资料写一篇文章...",
    "试试输入：帮我梳理一下当前的知识库..."
  ];
  let idx = 0;
  setInterval(() => {
    // Only update if input is not focused and empty
    if (document.activeElement !== promptEl && promptEl.value.trim() === "") {
      idx = (idx + 1) % placeholders.length;
      promptEl.setAttribute("placeholder", placeholders[idx]);
    }
  }, 4000);
})();
