<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inkfellow</title>
    <link rel="icon" href="./icon.png?v=3" />
    <link rel="stylesheet" href="./vendor/codemirror.min.css" />
    <link rel="stylesheet" href="./vendor/show-hint.css" />
    <link rel="stylesheet" href="./app.css?v=10" />
  </head>
  <body>
    <div id="shell" class="shell shellPanelHidden">

      <!-- ── Left Sidebar ───────────────────────────── -->
      <aside id="sidebar" class="sidebar">

        <div class="sidebarHeader">
          <div class="vaultSwitcherWrapper">
            <button id="btn-vault-switcher" class="vaultSwitcherBtn" type="button" aria-expanded="false" aria-haspopup="menu" title="切换笔记本">
              <h1 class="vaultSwitcherTitle">
                <span id="vault-label">加载中…</span>
                <svg class="vaultChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </h1>
            </button>
            <div id="vault-menu" class="vaultDropdownMenu" role="menu" hidden></div>
          </div>
          <button id="btn-new-note" class="sidebarNewNoteBtn" type="button" title="新建笔记" aria-label="新建笔记">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14" />
              <path d="M5 12h14" />
            </svg>
          </button>
        </div>

        <div class="search">
          <span class="searchIcon"></span>
          <input id="search-input" type="search" autocomplete="off" spellcheck="false" placeholder="搜索笔记内容… (Ctrl/⌘F)" aria-label="搜索笔记内容" aria-keyshortcuts="Control+F Meta+F" />
          <button id="btn-search-clear" class="searchClearBtn" type="button" aria-label="清除搜索" hidden>
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="4" x2="4" y2="12"/><line x1="4" y1="4" x2="12" y2="12"/></svg>
          </button>
        </div>

        <div id="search-results" class="searchResults" hidden></div>

        <div id="tree-panel" class="treePanel">
          <div id="tree" class="treeGroup"></div>
        </div>

        <div class="sidebarFooter">
          <button id="btn-git-footer" class="sidebarGitStatus" type="button" aria-controls="git-quick-popover" aria-expanded="false" aria-haspopup="dialog">
            <span id="sidebar-git-dot" class="sidebarGitDot"></span>
            <span id="sidebar-git-label" class="sidebarGitLabel">正在检查…</span>
            <span class="sidebarGitArrow" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m4 10 4-4 4 4"/></svg>
            </span>
          </button>
        </div>

      </aside>

      <!-- Sidebar resize handle -->
      <div id="sidebar-resizer" class="sidebarResizer"></div>

      <!-- ── Center: Reader ─────────────────────────── -->
      <main id="reader" class="reader">

        <header id="reader-header" class="readerHeader">
          <div class="readerHeaderLeft">
            <button id="btn-toggle-sidebar" class="iconButton" type="button" title="切换侧栏">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
            </button>
            <button id="btn-home" class="iconButton homeBtn" type="button" title="回到首页" aria-label="回到首页">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/></svg>
            </button>
            <div class="navButtons">
              <button id="btn-nav-back" class="iconButton navBtn" type="button" title="后退 (Alt+←)" disabled>
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,3 5,8 10,13"/></svg>
              </button>
              <button id="btn-nav-forward" class="iconButton navBtn" type="button" title="前进 (Alt+→)" disabled>
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,3 11,8 6,13"/></svg>
              </button>
            </div>
            <div id="note-meta" class="noteMeta">
              <span id="note-title">选择一篇笔记</span>
            </div>
          </div>
          <div class="readerActions">
            <span id="saved-hint" class="savedHint" hidden>已保存</span>
            <button id="btn-toggle-mode" class="editBtn" type="button" title="编辑笔记" hidden></button>
            <div class="moreMenuWrapper">
              <button id="btn-more-menu" class="iconButton" type="button" title="更多操作" aria-expanded="false" disabled>
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
              </button>
              <div id="more-menu" class="moreMenuDropdown" role="menu" hidden>
                <button id="menu-outline" class="moreMenuItem" type="button" role="menuitem" aria-controls="outline-popover" aria-expanded="false" aria-haspopup="dialog">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                  大纲
                </button>
                <div class="moreMenuDivider" role="separator"></div>
                <button id="menu-delete" class="moreMenuItem moreMenuItemDanger" type="button" role="menuitem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                  删除文件
                </button>
              </div>
            </div>
            <button id="btn-toggle-panel" class="fellowPill" type="button" title="Fellow" aria-label="Fellow AI 助手">
              <span aria-hidden="true">✦</span>
              <span>Fellow</span>
            </button>
          </div>
        </header>

        <div id="doc-area" class="docArea">
          <div class="emptyState">
            <div class="emptyStateIcon">
              <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="32" height="36" rx="3"/><line x1="15" y1="15" x2="33" y2="15"/><line x1="15" y1="21" x2="33" y2="21"/><line x1="15" y1="27" x2="25" y2="27"/></svg>
            </div>
            <p class="emptyStateTitle">打开或创建一篇笔记</p>
            <p class="emptyStateHint">从左侧选择笔记，或点击「新建笔记」开始记录</p>
            <button id="empty-create-note" class="emptyStateCta" type="button">新建笔记</button>
          </div>
        </div>

        <!-- Full sync workspace (replaces the document area) -->
        <section id="git-workspace" class="gitWorkspace" aria-label="同步详情" hidden>
          <header class="gitWorkspaceHeader">
            <button id="btn-close-git-workspace" class="gitWorkspaceBack" type="button" title="返回笔记" aria-label="返回笔记">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h2>同步</h2>
          </header>
          <div id="git-panel" class="gitTabPanel"></div>
        </section>

        <!-- Outline popover (opened from ⋯ menu) -->
        <div id="outline-popover" class="outlinePopover" role="dialog" aria-label="笔记大纲" tabindex="-1" hidden>
          <div class="outlinePopoverHeader">
            <span>大纲</span>
            <strong id="toc-count"></strong>
            <button id="btn-close-outline" class="outlinePopoverClose" type="button" title="关闭大纲" aria-label="关闭大纲">✕</button>
          </div>
          <ul id="toc-list" class="articleTocList"></ul>
          <p class="articleTocEmpty" id="toc-empty" hidden>当前笔记没有标题</p>
        </div>

      </main>

      <!-- Assistant panel resize handle -->
      <div id="panel-resizer" class="assistantPanelResizer"></div>

      <!-- ── Right: Fellow only ─────────────────────── -->
      <aside id="assistant-panel" class="assistantPanel">

        <div id="agent-panel" class="assistantPanelAgent">
          <iframe
            id="agent-frame"
            class="assistantPanelFrame"
            title="inkfellow Fellow"
            allow="clipboard-read; clipboard-write"
          ></iframe>
          <div id="agent-loading" class="assistantPanelLoading" role="status" aria-live="polite">
            <div class="assistantPanelLoadingMark" aria-hidden="true">✦</div>
            <div class="assistantPanelLoadingTitle">Fellow 正在启动</div>
            <div id="agent-loading-detail" class="assistantPanelLoadingDetail">正在连接本地 AI 服务...</div>
          </div>
        </div>

      </aside>
    </div>

    <!-- Quick sync popover anchored to the sidebar footer -->
    <aside id="git-quick-popover" class="gitQuickPopover" role="dialog" aria-label="快速同步" tabindex="-1" hidden>
      <header class="gitQuickHeader">
        <span>同步</span>
        <button id="btn-close-git-quick" class="outlinePopoverClose" type="button" title="关闭同步" aria-label="关闭同步">✕</button>
      </header>
      <div id="git-quick-content" class="gitQuickContent"></div>
    </aside>

    <!-- Context menu (floats near tree node "⋯" button) -->
    <div id="context-menu" class="treeActionMenu" hidden></div>

    <!-- Toast notification -->
    <div id="toast" class="toast" aria-live="polite" hidden></div>

    <!-- Rename / input dialog overlay -->
    <div id="dialog-overlay" class="dialogOverlay" hidden>
      <div class="dialog">
        <p id="dialog-message" class="dialogMessage"></p>
        <input id="dialog-input" class="dialogInput" type="text" />
        <div class="dialogActions">
          <button id="dialog-cancel" class="ghostButton" type="button">取消</button>
          <button id="dialog-confirm" class="primaryButton" type="button">确定</button>
        </div>
      </div>
    </div>

    <script src="./marked.min.js?v=4"></script>
    <script src="./vendor/codemirror.min.js"></script>
    <script src="./vendor/markdown.min.js"></script>
    <script src="./vendor/continuelist.min.js"></script>
    <script src="./vendor/show-hint.js"></script>
    <script src="./app.js?v=15"></script>
  </body>
</html>
