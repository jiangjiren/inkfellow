<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inkfellow — 启动中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(167,139,250,0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.25rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.85rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="logo">inkfellow</div>
  <div class="spinner"></div>
  <div class="status" id="status">正在启动本地服务...</div>

  <script>
    // The port is injected by the Rust backend via window.__NEXT_PORT__
    // Fallback: try reading from URL hash e.g. loading.html#3009
    function getPort() {
      if (window.__NEXT_PORT__) return window.__NEXT_PORT__;
      const hash = location.hash.replace('#', '');
      if (hash && !isNaN(parseInt(hash))) return parseInt(hash);
      return 3009;
    }

    const statusEl = document.getElementById('status');
    let attempts = 0;
    const maxAttempts = 60; // 60 * 500ms = 30 seconds timeout

    function tryConnect() {
      const port = getPort();
      const url = 'http://127.0.0.1:' + port;
      attempts++;
      statusEl.textContent = '正在等待服务就绪... (' + attempts + ')';

      fetch(url, { method: 'GET', cache: 'no-store' })
        .then(res => {
          if (res.ok || res.status < 500) {
            statusEl.textContent = '服务已就绪，正在跳转...';
            window.location.href = url;
          } else {
            scheduleRetry(port);
          }
        })
        .catch(() => {
          if (attempts >= maxAttempts) {
            statusEl.textContent = '启动超时，请重启应用。';
          } else {
            scheduleRetry(port);
          }
        });
    }

    function scheduleRetry(port) {
      setTimeout(tryConnect, 500);
    }

    // Start polling after a short initial delay
    setTimeout(tryConnect, 800);
  </script>
</body>
</html>
